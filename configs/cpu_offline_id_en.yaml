# Sample config: CPU-only offline Indonesian-English, diarization enabled
# Use this as a starting point and adjust values to your environment
privacy:
  offline_strict: true
input:
  source_path: "data/input"
  target_sample_rate: 16000
  target_channels: 1
  target_format: "wav"
enhancement:
  enable: true
  rnnoise_enable: true
  spectral_gating_enable: true
  agc_enable: true
  spectral_gating:
    n_fft: 1024
    hop_length: 256
    win_length: 1024
    noise_profile_duration_s: 2.0
    threshold_db: -32
    attenuation_db: -12
  normalize:
    target_peak_dbfs: -1.0
    apply_agc: true
vad:
  enable: true
  webrtc_mode: 3
  frame_ms: 30
  max_chunk_s: 35.0
  min_speech_s: 0.5
  min_silence_s: 0.4
  overlap_s: 0.4
diarization:
  enable: true
  backend: "resemblyzer"
  min_cluster_size: 10
  threshold: 0.23
  smoothing_s: 0.6
asr:
  backend: "faster_whisper"
  model_size: "medium"        # consider "distil-large-v3" for speed if available locally
  compute_type: "int8"
  beam_size: 5
  language_hints: ["id", "en"]
  word_timestamps: false
scheduler:
  workers: 1
  batch_segments: 6
postprocess:
  punctuation_restore_enable: false
  normalization_rules:
    collapse_whitespace: true
    strip_repeated_punctuation: true
export:
  formats: ["json", "srt", "vtt", "docx"]
  include_speaker_labels: true
  include_timestamps: true
checkpoint:
  enable: true
  storage_path: "data/cache/state.json"
logging:
  level: "INFO"
  file_path: "data/cache/pipeline.log"
models:
  whisper_dir: "models/whisper"
  resemblyzer_dir: "models/resemblyzer"
  rnnoise_lib: "models/rnnoise/librnnoise.dylib"
